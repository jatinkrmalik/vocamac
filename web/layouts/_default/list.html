{{ define "main" }}
<section class="feature-hero">
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        <h1>{{ .Title }}</h1>
        {{ with .Params.description }}<p class="feature-hero__subtitle">{{ . }}</p>{{ end }}
    </div>
</section>
<section class="feature-content">
    <div class="container">
        {{ .Content }}
        <div class="feature-list">
        {{ range .Pages }}
            <a href="{{ .Permalink }}" class="feature-list__item">
                <div class="feature-card">
                    <div class="feature-card__icon">{{ .Params.icon }}</div>
                    <h3>{{ .Title }}</h3>
                    <p>{{ .Params.subtitle }}</p>
                </div>
            </a>
        {{ end }}
        </div>
    </div>
</section>
{{ end }}
